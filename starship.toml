[nim]
symbol = "≤░Ηξ "

[rust]
symbol = "Όηρ"

[scala]
symbol = "Όε╖ "

[python]
symbol = "ΌΙ╡ "
format = "via [$virtualenv]($style) "
style = "bright-black"


[time]
disabled = true
#time_format = "%R" # Hour:Minute Format
time_format = "%a, %e %b %l:%M %p"
at = '[ έβξ $time ]'

