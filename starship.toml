format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$conda\
$line_break\
$character"""

[directory]
style = "cyan"
truncation_length = 1
truncation_symbol = "έΑο/"
read_only = 'ΏθΦΤ'
read_only_style = 'red'

[character]
success_symbol = "[έζψ](green)"
error_symbol = "[έζψ](red)"
#vimcmd_symbol = "[έζχ](green)"
[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[c]
symbol = "Όαη "

[conda]
symbol = 'ΏθΖΤ '
style = "bold green"
format = 'via [$symbol$environment](dimmed green) '
disabled = false
ignore_base = false
truncation_length = 1

[docker_context]
symbol = "ΎΝΙ "

[elixir]
symbol = "ΌΚ╡ "

[elm]
symbol = "Όαυ "

[git_branch]
symbol = "ΎΡα"
format = "[$branch]($style)"
style = "purple"
#style = "bright-black"

[git_status]
#format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "red"
#conflicted = "έΑΜ"
#untracked = "έΑΜ"
#modified = "έΑΜ"
#staged = "έΑΜ"
#renamed = "έΑΜ"
#deleted = "έΑΜ"
#stashed = "έΚκ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"


[golang]
symbol = "Όαπ "

[haskell]
symbol = "Όζ╖ "

[java]
symbol = "ΌΚΨ "

[julia]
symbol = "Όαν "

[nodejs]
